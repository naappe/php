<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhiteSaffron Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <main class="login-card">
    <div class="login-mark">WS</div>
    <h1>Admin Login</h1>
    <p>WhiteSaffron Villimale Bill Manager</p>
    <div class="login-error" id="loginError">Invalid username or password.</div>
    <form id="loginForm">
      <label>Username</label>
      <input id="username" autocomplete="username" required autofocus>
      <label>Password</label>
      <input id="password" type="password" autocomplete="current-password" required>
      <button class="primary-btn full" type="submit">Sign In</button>
    </form>
  </main>
  <script src="config.js"></script>
  <script>
    if (localStorage.getItem('ws_auth') === 'yes') location.href = 'index.html';
    document.getElementById('loginForm').addEventListener('submit', function (event) {
      event.preventDefault();
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      if (user === CONFIG.ADMIN_USERNAME && pass === CONFIG.ADMIN_PASSWORD) {
        localStorage.setItem('ws_auth', 'yes');
        localStorage.setItem('ws_user', user);
        localStorage.setItem('ws_login_time', new Date().toISOString());
        location.href = 'index.html';
      } else {
        document.getElementById('loginError').classList.add('show');
        document.getElementById('password').value = '';
      }
    });
  </script>
</body>
</html>
