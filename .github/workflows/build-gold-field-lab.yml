name: Build Gold Field Lab APK
on:
  workflow_dispatch:
  push:
    paths:
      - 'android-gold-test/**'
      - '.github/workflows/build-gold-field-lab.yml'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: Build debug APK
        working-directory: android-gold-test
        run: gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: GoldFieldLab-debug-apk
          path: android-gold-test/app/build/outputs/apk/debug/app-debug.apk
