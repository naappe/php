name: Build Magnetic Field Viewer APK
on:
  push:
    paths:
      - 'MagneticFieldViewer/**'
      - '.github/workflows/build-magnetic-apk.yml'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MagneticFieldViewer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - run: gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: MagneticFieldViewer-debug
          path: MagneticFieldViewer/app/build/outputs/apk/debug/app-debug.apk
