<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>WhiteSaffron Bill Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    if (localStorage.getItem('ws_auth') !== 'yes') location.href = 'login.html';
  </script>

  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">WS</div>
        <div>
          <h1>Bill Manager</h1>
          <p>WhiteSaffron Villimale</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="refreshBtn" title="Refresh">Refresh</button>
        <button class="icon-btn" id="exportBtn" title="Export CSV">Export</button>
        <button class="icon-btn danger-text" id="logoutBtn" title="Logout">Logout</button>
      </div>
    </header>

    <section class="hero-grid">
      <button class="hero-card hero-latest" id="latestCard">
        <span>Latest Bill Added</span>
        <strong id="latestVendor">Loading...</strong>
        <small id="latestMeta">Please wait</small>
      </button>
      <div class="hero-card">
        <span>This Month</span>
        <strong id="monthTotal">MVR 0.00</strong>
        <small id="monthCount">0 bills</small>
      </div>
      <div class="hero-card">
        <span>Last 30 Days</span>
        <strong id="last30Total">MVR 0.00</strong>
        <small id="last30Count">0 bills</small>
      </div>
    </section>

    <section class="stats-grid" id="statsGrid"></section>

    <section class="toolbar">
      <div class="search-box">
        <span>Search</span>
        <input id="searchInput" placeholder="Vendor, bill no, location, TIN..." autocomplete="off">
      </div>
      <select id="rangeFilter">
        <option value="all">All Time</option>
        <option value="today">Today</option>
        <option value="week">This Week</option>
        <option value="month">This Month</option>
        <option value="last30">Last 30 Days</option>
      </select>
      <button class="primary-btn" id="addBtn">Add Bill</button>
    </section>

    <main class="panel" id="content">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>Loading bills...</p>
      </div>
    </main>
  </div>

  <div class="modal-layer" id="modalLayer">
    <div class="modal">
      <div id="modalContent"></div>
    </div>
  </div>

  <div class="toast-wrap" id="toastWrap"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
