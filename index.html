<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>💰 Smart Bill Manager - MVR</title>
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <h1>
                💰 Bills
                <span>MVR</span>
            </h1>
            <div class="header-actions">
                <button class="btn" onclick="fetchAllBills()">🔄</button>
                <button class="btn" onclick="exportCSV()">📥</button>
                <button class="btn" onclick="toggleBackupPanel()">🔐</button>
            </div>
        </header>

        <!-- Stats -->
        <div id="stats" class="stats-grid">
            <!-- Stats will be rendered here -->
        </div>

        <!-- Filter Bar with Smart Search -->
        <div id="filterContainer" class="filter-container">
            <!-- Filters will be rendered here -->
        </div>

        <!-- Backup Panel (hidden by default) -->
        <div id="backupContainer" class="backup-container" style="display:none;">
            <!-- Backup UI will be rendered here -->
        </div>

        <!-- Notifications -->
        <div id="message"></div>

        <!-- Main Content -->
        <div id="content">
            <div class="empty-state">
                <div class="empty-icon">📄</div>
                <h3>Loading Bills...</h3>
                <p>Please wait while we fetch your data</p>
            </div>
        </div>
    </div>

    <!-- Floating Action Button -->
    <button class="fab" onclick="openCreateModal()" aria-label="Add New Bill">
        +
    </button>

    <!-- Modal -->
    <div id="modal" class="modal-overlay">
        <div class="modal">
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Load Config First -->
    <script src="config.js"></script>
    <!-- Then Load App -->
    <script src="app.js"></script>
    <!-- Then Load Backup System -->
    <script src="backup.js"></script>
</body>
</html>
