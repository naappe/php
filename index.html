<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💰 Bills Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1>💰 Bills <span>MVR</span></h1>
        <div>
            <button onclick="fetchAllBills()">🔄</button>
            <button onclick="exportCSV()">📥</button>
        </div>
    </header>

    <!-- Stats -->
    <div id="stats" class="stats"></div>

    <!-- Search -->
    <div class="search-container">
        <input id="searchInput" class="search-input" placeholder="🔍 Search bills...">
    </div>

    <!-- Filters -->
    <div id="filterContainer" class="filter-container"></div>

    <!-- Messages -->
    <div id="message"></div>

    <!-- Content -->
    <div id="content">
        <div class="empty">
            <div class="icon">📄</div>
            <h3>Loading...</h3>
            <p>Please wait</p>
        </div>
    </div>

    <!-- FAB -->
    <button class="fab" onclick="openCreate()">+</button>

    <!-- Modal -->
    <div id="modal" class="modal-overlay">
        <div class="modal">
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- Loading -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
