<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>💰 Bill Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- App Container -->
    <div class="app-container">

        <!-- ============================================ -->
        <!-- HEADER -->
        <!-- ============================================ -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo-icon">💰</div>
                <div>
                    <h1>Bill Manager</h1>
                    <span class="badge-pro">PRO</span>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-ghost" onclick="fetchAllBills(true)" title="Refresh">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                </button>
                <div class="user-avatar">JD</div>
            </div>
        </header>

        <!-- ============================================ -->
        <!-- STATS -->
        <!-- ============================================ -->
        <div id="stats" class="stats-grid"></div>

        <!-- ============================================ -->
        <!-- SEARCH & FILTERS -->
        <!-- ============================================ -->
        <div class="search-filter-bar">
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input id="searchInput" class="search-input" placeholder="Search vendors, bills, locations..." autocomplete="off">
                <kbd class="search-kbd">⌘K</kbd>
            </div>
            <div id="filterContainer" class="filter-container"></div>
        </div>

        <!-- ============================================ -->
        <!-- MESSAGES -->
        <!-- ============================================ -->
        <div id="message" class="message-container"></div>

        <!-- ============================================ -->
        <!-- CONTENT -->
        <!-- ============================================ -->
        <div id="content" class="content-area">
            <div class="loading-state">
                <div class="spinner"></div>
                <p>Loading your bills...</p>
            </div>
        </div>

        <!-- ============================================ -->
        <!-- FAB -->
        <!-- ============================================ -->
        <button class="fab" onclick="openCreate()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>

        <!-- ============================================ -->
        <!-- MODAL -->
        <!-- ============================================ -->
        <div id="modal" class="modal-overlay">
            <div class="modal">
                <div id="modalContent"></div>
            </div>
        </div>

        <!-- ============================================ -->
        <!-- LOADING OVERLAY -->
        <!-- ============================================ -->
        <div id="loadingOverlay" class="loading-overlay">
            <div class="spinner"></div>
            <p id="loadingText">Loading...</p>
        </div>

    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
