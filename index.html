<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhiteSaffron Bill Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <div class="login-layer" id="loginLayer">
    <form class="login-card" id="loginForm">
      <div class="brand-mark">WS</div>
      <h2>Admin Login</h2>
      <p>Sign in to manage WhiteSaffron bills.</p>
      <div class="error" id="loginError">Wrong username or password.</div>
      <label class="form-field">Username
        <input id="loginUser" autocomplete="username" required>
      </label>
      <label class="form-field">Password
        <input id="loginPass" type="password" autocomplete="current-password" required>
      </label>
      <div class="form-actions">
        <button class="btn primary" type="submit">Sign In</button>
      </div>
    </form>
  </div>

  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">WS</div>
        <div>
          <h1>Bill Manager</h1>
          <p>WhiteSaffron Villimale</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn" id="refreshBtn">Refresh</button>
        <button class="btn" id="exportBtn">Export CSV</button>
        <button class="btn danger" id="logoutBtn">Logout</button>
        <button class="btn primary" id="addBtn">Add Bill</button>
      </div>
    </header>

    <section class="dashboard">
      <button class="card latest-card" id="latestCard">
        <span class="label">Latest bill</span>
        <strong class="value" id="latestVendor">Loading...</strong>
        <small class="hint" id="latestMeta">Please wait</small>
      </button>
      <div class="card">
        <span class="label">This month</span>
        <strong class="value" id="monthTotal">MVR 0.00</strong>
        <small class="hint" id="monthCount">0 bills</small>
      </div>
      <div class="card">
        <span class="label">Today</span>
        <strong class="value" id="todayTotal">MVR 0.00</strong>
        <small class="hint" id="todayCount">0 bills</small>
      </div>
      <div class="card">
        <span class="label">Current view</span>
        <strong class="value" id="viewTotal">MVR 0.00</strong>
        <small class="hint" id="viewCount">0 bills shown</small>
      </div>
    </section>

    <section class="toolbar">
      <input class="search" id="searchInput" placeholder="Search vendor, bill no, location, TIN">
      <div class="filters">
        <button class="chip active" data-filter="all">All</button>
        <button class="chip" data-filter="today">Today</button>
        <button class="chip" data-filter="month">Month</button>
        <button class="chip" data-filter="last30">30 Days</button>
      </div>
    </section>

    <main class="content" id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading bills...</p>
      </div>
    </main>
  </div>

  <div class="modal-layer" id="modalLayer">
    <div class="modal" id="modal"></div>
  </div>

  <div class="toast-area" id="toastArea"></div>

  <script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
