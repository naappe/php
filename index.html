<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhiteSaffron Bills</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    if (localStorage.getItem('ws_logged_in') !== 'yes') window.location.href = 'login.html';
  </script>

  <div class="layout">
    <aside class="sidebar">
      <div class="side-brand">
        <div class="logo">WS</div>
        <div>
          <h1>WhiteSaffron</h1>
          <p>Bill Control</p>
        </div>
      </div>
      <nav class="side-nav">
        <button class="nav-item active">Dashboard</button>
        <button class="nav-item" id="sideAddBtn">Add Bill</button>
        <button class="nav-item" id="sideExportBtn">Export CSV</button>
      </nav>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">WhiteSaffron Villimale</p>
          <h2>Bill Manager</h2>
        </div>
        <div class="top-actions">
          <button id="refreshBtn" class="light-btn">Refresh</button>
          <button id="addMainBtn" class="primary-btn">Add Bill</button>
        </div>
      </header>

      <section class="quick-home">
        <button class="metric-card latest-card" id="latestBox">
          <span>Latest bill</span>
          <strong id="latestTitle">Loading...</strong>
          <small id="latestInfo">Please wait</small>
        </button>
        <div class="metric-card">
          <span>This month</span>
          <strong id="monthTotal">MVR 0.00</strong>
          <small id="monthCount">0 bills</small>
        </div>
        <div class="metric-card">
          <span>Today</span>
          <strong id="todayTotal">MVR 0.00</strong>
          <small id="todayCount">0 bills</small>
        </div>
      </section>

      <section class="tools">
        <input id="searchInput" placeholder="Search vendor, bill no, location, TIN">
        <div class="chips">
          <button class="chip active" data-range="all">All</button>
          <button class="chip" data-range="today">Today</button>
          <button class="chip" data-range="month">Month</button>
          <button class="chip" data-range="last30">30 Days</button>
        </div>
      </section>

      <section class="stats" id="stats"></section>

      <section class="content" id="content">
        <div class="loading">
          <div class="spinner"></div>
          <p>Loading bills...</p>
        </div>
      </section>
    </main>
  </div>

  <div class="modal-layer" id="modalLayer">
    <div class="modal" id="modal"></div>
  </div>

  <div class="toast-area" id="toastArea"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
