<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhiteSaffron Bills</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    if (localStorage.getItem('ws_logged_in') !== 'yes') window.location.href = 'login.html';
  </script>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">WS</div>
        <div>
          <h1>Bill Manager</h1>
          <p>WhiteSaffron Villimale</p>
        </div>
      </div>
      <div class="top-actions">
        <button id="refreshBtn" class="light-btn">Refresh</button>
        <button id="exportBtn" class="light-btn">Export</button>
        <button id="logoutBtn" class="light-btn danger-text">Logout</button>
      </div>
    </header>

    <section class="quick-home">
      <button class="latest-box" id="latestBox">
        <span>Latest Bill</span>
        <strong id="latestTitle">Loading...</strong>
        <small id="latestInfo">Please wait</small>
      </button>
      <div class="summary-box">
        <span>This Month</span>
        <strong id="monthTotal">MVR 0.00</strong>
        <small id="monthCount">0 bills</small>
      </div>
      <div class="summary-box">
        <span>Today</span>
        <strong id="todayTotal">MVR 0.00</strong>
        <small id="todayCount">0 bills</small>
      </div>
      <button class="add-main" id="addMainBtn">+ Add Bill</button>
    </section>

    <section class="tools">
      <input id="searchInput" placeholder="Search vendor, bill no, location, TIN...">
      <div class="chips">
        <button class="chip active" data-range="all">All</button>
        <button class="chip" data-range="today">Today</button>
        <button class="chip" data-range="month">This Month</button>
        <button class="chip" data-range="last30">Last 30 Days</button>
      </div>
    </section>

    <section class="stats" id="stats"></section>

    <main class="content" id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading bills...</p>
      </div>
    </main>
  </div>

  <div class="modal-layer" id="modalLayer">
    <div class="modal" id="modal"></div>
  </div>

  <div class="toast-area" id="toastArea"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
